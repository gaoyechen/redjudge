name: Validate RedJudge

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run package validation
        run: python scripts/check-redjudge-evals.py

      - name: Validate eval JSON
        run: python -m json.tool evals/evals.json > /tmp/evals.json
